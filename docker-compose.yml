services:
  s12ryt-tg-api:
    image: ${S12RYT_IMAGE:-ghcr.io/s12ryt/s12ryt-tg-api:latest}
    container_name: ${S12RYT_CONTAINER_NAME:-s12ryt-tg-api}
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?Set BOT_TOKEN in .env}
      ADMIN_ID: ${ADMIN_ID:?Set ADMIN_ID in .env}
      API_PORT: ${API_PORT:-8000}
      DATABASE_PATH: ${DATABASE_PATH:-./data/bot.db}
      DATABASE_URL: ${DATABASE_URL:-}
      DEFAULT_API_URL: ${DEFAULT_API_URL:-http://localhost:8000}
      NODEJS_PLUGIN_PATHS: ${NODEJS_PLUGIN_PATHS:-}
      CLOUDFLARE_TUNNEL: ${CLOUDFLARE_TUNNEL:-}
      CLOUDFLARE_TOKEN: ${CLOUDFLARE_TOKEN:-}
      GITHUB_MIRROR: ${GITHUB_MIRROR:-}
      NPM_REGISTRY: ${NPM_REGISTRY:-}
      memory: ${memory:-}
    volumes:
      - ./nodejs/data:/app/nodejs/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "const http=require('http');const port=process.env.API_PORT||8000;const req=http.get({host:'127.0.0.1',port,path:'/health',timeout:3000},res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.on('timeout',()=>{req.destroy();process.exit(1);});"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
